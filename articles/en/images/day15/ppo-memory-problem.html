<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
</head>
<body>
<svg viewBox="0 0 1600 950" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#94a3b8"/></marker>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#f87171"/></marker>
    <linearGradient id="gbg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1e293b"/><stop offset="100%" stop-color="#334155"/></linearGradient>
  </defs>

  <!-- BG -->
  <rect width="1600" height="950" fill="#0f172a"/>

  <!-- Title -->
  <text x="800" y="46" text-anchor="middle" fill="#f1f5f9" font-size="28" font-weight="700">PPO Training: Why It Consumes So Much Memory</text>
  <text x="800" y="74" text-anchor="middle" fill="#cbd5e1" font-size="16">All 4 models below must be loaded in GPU memory at the same time — this is the #1 reason PPO is expensive</text>

  <!-- GPU box -->
  <rect x="50" y="95" width="1500" height="430" rx="14" fill="url(#gbg)" stroke="#475569" stroke-width="2"/>
  <text x="78" y="125" fill="#64748b" font-size="14" font-weight="700" letter-spacing="2">🖥️ GPU MEMORY</text>

  <!-- ===== ① Policy ===== -->
  <rect x="90" y="145" width="310" height="350" rx="10" fill="#0f766e" fill-opacity="0.18" stroke="#14b8a6" stroke-width="2"/>
  <rect x="90" y="145" width="310" height="48" rx="10" fill="#14b8a6" fill-opacity="0.22"/>
  <text x="245" y="177" text-anchor="middle" fill="#5eead4" font-size="18" font-weight="700">① Policy Model πθ</text>
  <circle cx="370" cy="169" r="7" fill="#22c55e"><animate attributeName="opacity" values="1;.3;1" dur="1.5s" repeatCount="indefinite"/></circle>
  <text x="245" y="218" text-anchor="middle" fill="#ccfbf1" font-size="15">The model being optimized</text>
  <text x="120" y="248" fill="#94a3b8" font-size="14">• Generates responses</text>
  <text x="120" y="272" fill="#94a3b8" font-size="14">• Receives gradient updates</text>
  <text x="120" y="296" fill="#94a3b8" font-size="14">• Active during all steps</text>
  <rect x="120" y="420" width="250" height="55" rx="8" fill="#134e4a" fill-opacity="0.6"/>
  <text x="245" y="445" text-anchor="middle" fill="#5eead4" font-size="20" font-weight="700">7B params</text>
  <text x="245" y="467" text-anchor="middle" fill="#2dd4bf" font-size="13">~14 GB (FP16)</text>

  <!-- ===== ② Reference ===== -->
  <rect x="440" y="145" width="310" height="350" rx="10" fill="#1e293b" fill-opacity="0.4" stroke="#64748b" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="440" y="145" width="310" height="48" rx="10" fill="#475569" fill-opacity="0.22"/>
  <text x="595" y="177" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">② Reference Model πref</text>
  <rect x="690" y="152" width="50" height="20" rx="4" fill="#475569"/>
  <text x="715" y="167" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">FROZEN</text>
  <text x="595" y="218" text-anchor="middle" fill="#cbd5e1" font-size="15">Frozen copy of SFT model</text>
  <text x="470" y="248" fill="#94a3b8" font-size="14">• Computes KL divergence</text>
  <text x="470" y="272" fill="#94a3b8" font-size="14">• Prevents policy drift</text>
  <text x="470" y="296" fill="#94a3b8" font-size="14">• No gradient updates</text>
  <rect x="470" y="420" width="250" height="55" rx="8" fill="#1e293b" fill-opacity="0.6"/>
  <text x="595" y="445" text-anchor="middle" fill="#cbd5e1" font-size="20" font-weight="700">7B params</text>
  <text x="595" y="467" text-anchor="middle" fill="#94a3b8" font-size="13">~14 GB (FP16)</text>

  <!-- ===== ③ Reward Model ===== -->
  <rect x="790" y="145" width="310" height="240" rx="10" fill="#7f1d1d" fill-opacity="0.12" stroke="#f87171" stroke-width="2"/>
  <rect x="790" y="145" width="310" height="48" rx="10" fill="#f87171" fill-opacity="0.12"/>
  <text x="945" y="177" text-anchor="middle" fill="#fca5a5" font-size="18" font-weight="700">③ Reward Model</text>
  <text x="945" y="218" text-anchor="middle" fill="#fecaca" font-size="15">Scores each response</text>
  <text x="820" y="248" fill="#94a3b8" font-size="14">• Trained on human preferences</text>
  <text x="820" y="272" fill="#94a3b8" font-size="14">• Outputs scalar r(x,y)</text>
  <rect x="810" y="300" width="270" height="58" rx="6" fill="#7f1d1d" fill-opacity="0.5" stroke="#f87171" stroke-width="1"/>
  <text x="945" y="324" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="600">⚠ REWARD HACKING RISK</text>
  <text x="945" y="345" text-anchor="middle" fill="#f87171" font-size="12">Policy exploits reward gaps</text>

  <!-- ===== ④ Value Head ===== -->
  <rect x="790" y="405" width="310" height="85" rx="10" fill="#7c2d12" fill-opacity="0.12" stroke="#fb923c" stroke-width="2"/>
  <text x="945" y="440" text-anchor="middle" fill="#fdba74" font-size="18" font-weight="700">④ Value Head (Critic)</text>
  <text x="945" y="468" text-anchor="middle" fill="#94a3b8" font-size="14">Estimates advantage A(s,a)</text>

  <!-- ===== Flow Arrows ===== -->
  <!-- Prompt → Policy -->
  <text x="42" y="330" fill="#cbd5e1" font-size="14" text-anchor="end" font-weight="600">Prompt</text>
  <line x1="48" y1="325" x2="86" y2="325" stroke="#94a3b8" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Policy → Reference -->
  <line x1="400" y1="280" x2="436" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#a1)"/>
  <rect x="400" y="260" width="35" height="16" rx="3" fill="#1e293b"/>
  <text x="418" y="272" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">KL</text>

  <!-- Policy output → Reward -->
  <path d="M 400 330 Q 590 330 786 230" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a1)"/>

  <!-- Policy output → Value Head -->
  <path d="M 400 380 Q 590 400 786 440" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a1)"/>

  <!-- Reward → Policy (big feedback) -->
  <path d="M 790 360 C 550 520 300 520 245 498" fill="none" stroke="#f87171" stroke-width="3" marker-end="url(#a2)"/>
  <rect x="450" y="490" width="190" height="22" rx="4" fill="#0f172a" fill-opacity="0.8"/>
  <text x="545" y="506" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="600">reward → update policy</text>

  <!-- 5th column: what about DPO? -->
  <rect x="1140" y="145" width="380" height="345" rx="10" fill="#1e3a5f" fill-opacity="0.15" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,4"/>
  <rect x="1140" y="145" width="380" height="48" rx="10" fill="#3b82f6" fill-opacity="0.12"/>
  <text x="1330" y="177" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="700">💡 DPO (for comparison)</text>
  <text x="1170" y="218" fill="#bfdbfe" font-size="15">Only needs 2 models:</text>
  <text x="1170" y="248" fill="#94a3b8" font-size="14">✓ Policy Model (active)</text>
  <text x="1170" y="272" fill="#94a3b8" font-size="14">✓ Reference Model (frozen)</text>
  <text x="1170" y="304" fill="#64748b" font-size="14">✗ No Reward Model needed</text>
  <text x="1170" y="328" fill="#64748b" font-size="14">✗ No Value Head needed</text>
  <rect x="1170" y="355" width="320" height="55" rx="8" fill="#1e3a5f" fill-opacity="0.4"/>
  <text x="1330" y="380" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="700">~14B params (2× only)</text>
  <text x="1330" y="402" text-anchor="middle" fill="#60a5fa" font-size="13">Half the memory of PPO</text>
  <text x="1330" y="445" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="600">→ No reward hacking</text>
  <text x="1330" y="470" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="600">→ Stable training</text>

  <!-- VS divider -->
  <line x1="1120" y1="165" x2="1120" y2="470" stroke="#475569" stroke-width="2" stroke-dasharray="4,6"/>
  <text x="1120" y="140" text-anchor="middle" fill="#64748b" font-size="13" font-weight="700">VS</text>

  <!-- Memory bar -->
  <rect x="90" y="510" width="1420" height="12" rx="6" fill="#ef4444" opacity="0.75"/>
  <text x="800" y="520" text-anchor="middle" fill="#fff" font-size="9" font-weight="700" letter-spacing="1">PPO TOTAL: ~28B PARAMS (4×) FOR A 7B MODEL  ·  DPO: ~14B PARAMS (2×)  ·  ORPO: ~7B PARAMS (1×)</text>

  <!-- ===== Bottom: Pain Points ===== -->
  <rect x="50" y="545" width="1500" height="370" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="800" y="580" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700">The 4 Pain Points of PPO (from §1.2)</text>

  <!-- Pain 1 -->
  <rect x="80" y="600" width="710" height="65" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="112" cy="632" r="16" fill="#ef4444"/>
  <text x="112" y="638" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">1</text>
  <text x="142" y="626" fill="#fca5a5" font-size="16" font-weight="600">Memory: 4× base model</text>
  <text x="142" y="650" fill="#94a3b8" font-size="13">4 models simultaneously in GPU → for 70B model, needs ~8× A100 80GB GPUs</text>

  <!-- Pain 2 -->
  <rect x="810" y="600" width="710" height="65" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="842" cy="632" r="16" fill="#f59e0b"/>
  <text x="842" y="638" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">2</text>
  <text x="872" y="626" fill="#fcd34d" font-size="16" font-weight="600">Reward Hacking</text>
  <text x="872" y="650" fill="#94a3b8" font-size="13">Policy learns to exploit reward model gaps → verbose, sycophantic outputs</text>

  <!-- Pain 3 -->
  <rect x="80" y="680" width="710" height="65" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="112" cy="712" r="16" fill="#a78bfa"/>
  <text x="112" y="718" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">3</text>
  <text x="142" y="706" fill="#c4b5fd" font-size="16" font-weight="600">Hyperparameter Sensitivity</text>
  <text x="142" y="730" fill="#94a3b8" font-size="13">7–10 critical HPs: learning rate, clip range, KL coeff, GAE λ, discount factor…</text>

  <!-- Pain 4 -->
  <rect x="810" y="680" width="710" height="65" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="842" cy="712" r="16" fill="#fb923c"/>
  <text x="842" y="718" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">4</text>
  <text x="872" y="706" fill="#fdba74" font-size="16" font-weight="600">Training Instability</text>
  <text x="872" y="730" fill="#94a3b8" font-size="13">Loss spikes unpredictably — needs multiple restarts &amp; constant monitoring</text>

  <!-- Key takeaway -->
  <rect x="80" y="770" width="1440" height="120" rx="10" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="800" y="810" text-anchor="middle" fill="#4ade80" font-size="20" font-weight="700">💡 Key Takeaway</text>
  <text x="800" y="840" text-anchor="middle" fill="#e2e8f0" font-size="16">PPO works (ChatGPT proved it), but the cost is enormous: 4× memory, reward hacking risk, fragile hyperparameters, unstable training.</text>
  <text x="800" y="866" text-anchor="middle" fill="#e2e8f0" font-size="16">DPO achieves comparable results with half the memory, no reward model, and stable SGD-like training. This is why the field is moving away from PPO.</text>

  <!-- Footer -->
  <text x="800" y="935" text-anchor="middle" fill="#475569" font-size="12">Day 15: DPO and Alternatives — LLM Fundamentals</text>
</svg>
</body>
</html>
